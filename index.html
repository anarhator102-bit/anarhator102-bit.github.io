<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALLOWEDCLOUD</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

body{
    background:#050505;
    color:white;
    position:relative;
}

/* BACKGROUND */

body::before{
    content:'';
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
    top:-220px;
    left:-220px;
    filter:blur(40px);
    animation:floatBg 12s infinite alternate ease-in-out;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
    bottom:-220px;
    right:-220px;
    filter:blur(50px);
    animation:floatBg2 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes floatBg{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(120px,80px) scale(1.2);
    }
}

@keyframes floatBg2{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(-100px,-70px) scale(1.15);
    }
}

/* APP */

.app{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:#0d0d0d;
    border-right:1px solid rgba(255,255,255,.06);
    padding:28px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:34px;
    font-weight:700;
    margin-bottom:35px;
    position:relative;
}

.logo::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-6px;
    width:70%;
    height:3px;
    border-radius:999px;
    background:white;
    animation:logoGlow 2.5s infinite alternate;
}

@keyframes logoGlow{
    from{
        opacity:.4;
        width:40%;
    }
    to{
        opacity:1;
        width:80%;
    }
}

.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
    height:100%;
}

.nav button{
    background:#151515;
    border:none;
    color:white;
    padding:16px;
    border-radius:18px;
    cursor:pointer;
    font-size:15px;
    transition:.25s;
}

.nav button:hover{
    background:white;
    color:black;
    transform:translateY(-2px);
}

.upload-btn{
    margin-top:auto;
    background:white !important;
    color:black !important;
    font-weight:700;
}

/* MAIN */

.main{
    flex:1;
    padding:35px;
    padding-bottom:220px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
}

.search{
    width:320px;
    background:#111;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
    font-size:14px;
}

.profile{
    display:flex;
    align-items:center;
    gap:12px;
    background:#111;
    padding:12px 18px;
    border-radius:16px;
    cursor:pointer;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:white;
}

/* HERO */

.hero{
    background:linear-gradient(145deg,#1b1b1b,#0d0d0d);
    border:1px solid rgba(255,255,255,.06);
    padding:45px;
    border-radius:30px;
    margin-bottom:35px;
    position:relative;
    overflow:hidden;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.05),
        transparent
    );
    animation:shine 6s infinite linear;
}

@keyframes shine{
    from{
        transform:translateX(-100%);
    }
    to{
        transform:translateX(100%);
    }
}

.hero h1{
    font-size:48px;
    margin-bottom:12px;
}

.hero p{
    opacity:.7;
    line-height:1.6;
    max-width:650px;
}

.hero button{
    margin-top:24px;
    border:none;
    background:white;
    color:black;
    padding:16px 22px;
    border-radius:18px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.hero button:hover{
    transform:translateY(-3px) scale(1.03);
}

/* TRACKS */

.section-title{
    margin-bottom:22px;
    font-size:24px;
}

.track-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
}

.card{
    background:#101010;
    border-radius:26px;
    padding:16px;
    border:1px solid rgba(255,255,255,.05);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
}

.cover{
    width:100%;
    height:210px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:16px;
    transition:.4s;
}

.card:hover .cover{
    transform:scale(1.03);
}

.track-name{
    font-size:19px;
    font-weight:700;
    margin-bottom:5px;
}

.artist{
    opacity:.6;
    margin-bottom:18px;
}

.stats{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.stats-left{
    display:flex;
    gap:15px;
    font-size:14px;
    opacity:.8;
}

.play{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    color:black;
    cursor:pointer;
    font-weight:700;
    transition:.25s;
}

.play:hover{
    transform:scale(1.08);
}

/* PROFILE PAGE */

.profile-page{
    display:none;
}

.profile-box{
    background:#101010;
    border-radius:30px;
    padding:40px;
}

.big-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    margin-bottom:20px;
}

/* PLAYER */

.player{
    position:fixed;
    left:260px;
    right:0;
    bottom:0;
    background:#0c0c0c;
    border-top:1px solid rgba(255,255,255,.06);
    padding:16px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    z-index:999;
}

.player-track{
    display:flex;
    align-items:center;
    gap:14px;
}

.player-track img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:16px;
}

.controls{
    display:flex;
    align-items:center;
    gap:14px;
}

.controls button{
    border:none;
    background:white;
    color:black;
    padding:14px 18px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
}

.range{
    width:240px;
}

.volume-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:#141414;
    padding:10px 14px;
    border-radius:14px;
}

.volume-range{
    width:110px;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

.modal-content{
    width:420px;
    background:#0f0f0f;
    border-radius:28px;
    padding:28px;
}

.modal-content input{
    width:100%;
    margin-bottom:14px;
    background:#161616;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
}

.modal-content button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:16px;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding-bottom:240px;
    }

    .app{
        display:block;
    }

    .sidebar{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        height:82px;
        padding:10px;
        border:none;
        border-top:1px solid rgba(255,255,255,.08);
        z-index:9999;
        background:#0d0d0d;
    }

    .logo{
        display:none;
    }

    .nav{
        flex-direction:row;
        gap:8px;
    }

    .nav button{
        flex:1;
        height:58px;
        padding:0 6px;
        font-size:11px;
        border-radius:14px;
    }

    .upload-btn{
        margin-top:0;
    }

    .main{
        padding:14px;
        padding-bottom:340px;
    }

    .header{
        flex-direction:column;
        align-items:stretch;
        gap:14px;
    }

    .search{
        width:100%;
        height:58px;
        font-size:16px;
    }

    .profile{
        width:100%;
        justify-content:center;
    }

    .hero{
        padding:28px;
        border-radius:24px;
    }

    .hero h1{
        font-size:34px;
        line-height:1.1;
    }

    .hero button{
        width:100%;
        height:58px;
        font-size:16px;
    }

    .track-grid{
        grid-template-columns:1fr;
    }

    .cover{
        height:240px;
    }

    .player{
        left:0;
        right:0;
        bottom:82px;
        width:100%;
        padding:14px;
        flex-direction:column;
        align-items:stretch;
        gap:14px;
        border-radius:24px 24px 0 0;
    }

    .controls{
        flex-direction:column;
        width:100%;
        gap:12px;
    }

    .controls button{
        width:100%;
    }

    .range{
        width:100%;
    }

    .volume-box{
        width:100%;
    }

    .volume-range{
        width:100%;
    }

    .modal{
        padding:12px;
    }

    .modal-content{
        width:100%;
    }

}


.play,
.hero button,
.upload-btn{
    transition:.18s ease;
}

.play:hover,
.hero button:hover,
.upload-btn:hover{
    transform:scale(1.05);
}

.like-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#1a1a1a;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:.18s ease;
}

.like-btn:hover{
    transform:scale(1.05);
    background:white;
    color:black;
}

.playing{
    background:#dcdcdc !important;
}

</style>
</head>

<body>

<!-- MODAL -->

<div class="modal" id="uploadModal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">
upload a track
</h2>

<input type="text" id="trackTitle" placeholder="track name">

<input type="text" id="trackArtist" placeholder="artist">

<input type="file" id="trackCover" accept="image/*">

<input type="file" id="trackAudio" accept="audio/*">

<button onclick="uploadTrack()">
Add track
</button>

</div>

</div>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
allo.wed cloud
</div>

<div class="nav">

<button onclick="showHome()">
main
</button>

<button onclick="showProfile()">
profile
</button>

<button
class="upload-btn"
onclick="openUpload()"
>
＋ upload
</button>

</div>

</div>

<!-- HOME -->

<div class="main" id="homePage">

<div class="header">

<input
class="search"
id="searchInput"
placeholder="track search..."
onkeyup="searchTracks()"
>

<div class="profile" onclick="showProfile()">

<div class="avatar"></div>

<div>@alex</div>

</div>

</div>

<div class="hero">

<h1>allo.wed cloud</h1>

<p>
Upload your tracks,
listen to music,
collect likes and views.
</p>

<button onclick="openUpload()">
UPLOAD TRACK
</button>

</div>

<h2 class="section-title">
all tracks
</h2>

<div class="track-grid" id="trackGrid"></div>

</div>

<!-- PROFILE -->

<div class="main profile-page" id="profilePage">

<div class="header">

<input
class="search"
id="profileSearch"
placeholder="search my tracks..."
onkeyup="searchMyTracks()"
>

<div class="profile" onclick="showHome()">

<div class="avatar"></div>

<div>back home</div>

</div>

</div>

<div class="profile-box">

<div class="big-avatar"></div>

<h1>@alex</h1>

<p style="opacity:.6;margin-top:10px;">
music profile
</p>

<div
id="myTracks"
style="
margin-top:30px;
display:flex;
flex-direction:column;
gap:16px;
"
></div>

</div>

</div>

</div>

<!-- PLAYER -->

<div class="player">

<div class="player-track">

<img id="playerCover" src="https://picsum.photos/100">

<div>

<div id="playerTitle">
there is no active track
</div>

<div id="playerArtist" style="opacity:.6;">
—
</div>

</div>

</div>

<div class="controls">

<button
id="mainPlayBtn"
onclick="togglePlay()"
>
▶ PLAY
</button>

<input
type="range"
class="range"
id="progressBar"
value="0"
>

<div class="volume-box">

<span>🔊</span>

<input
type="range"
class="volume-range"
id="volumeControl"
min="0"
max="1"
step="0.01"
value="1"
>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

let tracks = [];
let currentTrack = null;

const audio = document.getElementById('audio');
const grid = document.getElementById('trackGrid');

/* LOAD TRACKS */

async function loadTracks(){

    try{

        const res = await fetch(
            'https://anarhator102-bit-github-io.onrender.com/tracks'
        );

        tracks = await res.json();

    }catch(e){

        tracks = [];

    }

    renderTracks();

}

/* RENDER TRACKS */

function renderTracks(list = tracks){

    grid.innerHTML = '';

    if(list.length === 0){

        grid.innerHTML = `
            <div style="opacity:.5;">
                Треки пока не загружены
            </div>
        `;

        return;
    }

    list.forEach(track => {

        const card = document.createElement('div');

        card.className = 'card';

        card.innerHTML = `

            <img
            class="cover"
            src="https://anarhator102-bit-github-io.onrender.com${track.cover}"
            >

            <div class="track-name">
                ${track.title}
            </div>

            <div class="artist">
                ${track.artist}
            </div>

            <div class="stats">

                <div class="stats-left">
                    <span>▶ ${track.plays}</span>
                    <span>♥ ${track.likes}</span>
                </div>

                <div style="
                    display:flex;
                    gap:10px;
                ">

                <button
                class="like-btn"
                onclick="likeTrack(${track.id})"
                >
                ♥
                </button>

                <button
                class="play"
                data-id="${track.id}"
                onclick="playTrack(${track.id})"
                >
                ▶
                </button>

                </div>

            </div>

        `;

        grid.appendChild(card);

    });

    renderMyTracks();

}

/* PROFILE TRACKS */

function renderMyTracks(list = tracks){

    const box = document.getElementById('myTracks');

    if(!box) return;

    box.innerHTML = '';

    list.forEach(track => {

        const div = document.createElement('div');

        div.style.background = '#151515';
        div.style.borderRadius = '24px';
        div.style.padding = '18px';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'space-between';
        div.style.gap = '14px';
        div.style.flexWrap = 'wrap';

        div.innerHTML = `

            <div style="
                display:flex;
                align-items:center;
                gap:14px;
            ">

                <img
                src="https://anarhator102-bit-github-io.onrender.com${track.cover}"
                style="
                    width:70px;
                    height:70px;
                    border-radius:18px;
                    object-fit:cover;
                "
                >

                <div>

                    <div style="
                        font-size:18px;
                        font-weight:700;
                    ">
                        ${track.title}
                    </div>

                    <div style="
                        opacity:.6;
                        margin-top:6px;
                    ">
                        ${track.artist}
                    </div>

                    <div style="
                        margin-top:10px;
                        opacity:.75;
                        font-size:14px;
                    ">
                        ▶ ${track.plays}
                        &nbsp;&nbsp;
                        ♥ ${track.likes}
                    </div>

                </div>

            </div>

            <div style="
                display:flex;
                gap:10px;
            ">

            <button
            class="like-btn"
            onclick="likeTrack(${track.id})"
            >
                ♥
            </button>

            <button
            class="play"
            data-id="${track.id}"
            onclick="playTrack(${track.id})"
            style="
                border:none;
                background:white;
                color:black;
                padding:14px 18px;
                border-radius:16px;
                font-weight:700;
                cursor:pointer;
            "
            >
                ▶
            </button>

            </div>

        `;

        box.appendChild(div);

    });

}

/* SEARCH */

function searchTracks(){

    const value =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

    const filtered = tracks.filter(track =>

        track.title.toLowerCase().includes(value) ||

        track.artist.toLowerCase().includes(value)

    );

    renderTracks(filtered);

}

function searchMyTracks(){

    const value =
    document.getElementById('profileSearch')
    .value
    .toLowerCase();

    const filtered = tracks.filter(track =>

        track.title.toLowerCase().includes(value) ||

        track.artist.toLowerCase().includes(value)

    );

    renderMyTracks(filtered);

}

/* PLAY */

function syncButtons(){

    document.querySelectorAll('.play')
    .forEach(btn => {

        const id = Number(btn.dataset.id);

        if(
            currentTrack &&
            currentTrack.id === id &&
            !audio.paused
        ){

            btn.innerHTML = '❚❚';
            btn.classList.add('playing');

        }else{

            btn.innerHTML = '▶';
            btn.classList.remove('playing');

        }

    });

}

async function playTrack(id){

    const track =
    tracks.find(t => t.id === id);

    if(!track) return;

    if(
        currentTrack &&
        currentTrack.id === id
    ){

        if(audio.paused){

            audio.play();

        }else{

            audio.pause();

        }

        syncButtons();

        return;

    }

    currentTrack = track;

    audio.src =
    'https://anarhator102-bit-github-io.onrender.com' +
    track.audio;

    audio.play();

    fetch(
        'https://anarhator102-bit-github-io.onrender.com/track/' +
        track.id +
        '/play',
        {
            method:'POST'
        }
    )
    .then(res => res.json())
    .then(data => {

        if(data.plays !== undefined){

            track.plays = data.plays;

            renderTracks();

        }

    });

    document.getElementById('playerTitle').innerText =
    track.title;

    document.getElementById('playerArtist').innerText =
    track.artist;

    document.getElementById('playerCover').src =
    'https://anarhator102-bit-github-io.onrender.com' +
    track.cover;

    syncButtons();

}

async function likeTrack(id){

    const track =
    tracks.find(t => t.id === id);

    if(!track) return;

    const res = await fetch(
        'https://anarhator102-bit-github-io.onrender.com/track/' +
        id +
        '/like',
        {
            method:'POST'
        }
    );

    const data = await res.json();

    if(data.likes !== undefined){

        track.likes = data.likes;

        renderTracks();

    }

}

/* TOGGLE */

function togglePlay(){

    const btn =
    document.getElementById('mainPlayBtn');

    if(!audio.src) return;

    if(audio.paused){

        audio.play();

        btn.innerHTML = '❚❚ PAUSE';

    }else{

        audio.pause();

        btn.innerHTML = '▶ PLAY';

    }

}

/* UPLOAD */

async function uploadTrack(){

    const title =
    document.getElementById('trackTitle').value;

    const artist =
    document.getElementById('trackArtist').value;

    const coverFile =
    document.getElementById('trackCover').files[0];

    const audioFile =
    document.getElementById('trackAudio').files[0];

    if(!title || !artist || !coverFile || !audioFile){

        alert('Заполни все поля');

        return;
    }

    const formData = new FormData();

    formData.append('title', title);
    formData.append('artist', artist);
    formData.append('cover', coverFile);
    formData.append('audio', audioFile);

    const res = await fetch(
        'https://anarhator102-bit-github-io.onrender.com/upload',
        {
            method:'POST',
            body:formData
        }
    );

    const data = await res.json();

    if(!res.ok){

        alert(data.error || 'Ошибка');

        return;

    }

    tracks.unshift(data);

    renderTracks();

    closeUpload();

}

/* MODAL */

function openUpload(){

    document.getElementById('uploadModal')
    .style.display = 'flex';

}

function closeUpload(){

    document.getElementById('uploadModal')
    .style.display = 'none';

}

window.onclick = function(e){

    if(e.target.id === 'uploadModal'){

        closeUpload();

    }

}

/* NAVIGATION */

function showProfile(){

    document.getElementById('homePage')
    .style.display = 'none';

    document.getElementById('profilePage')
    .style.display = 'block';

    renderMyTracks();

}

function showHome(){

    document.getElementById('homePage')
    .style.display = 'block';

    document.getElementById('profilePage')
    .style.display = 'none';

}

/* PLAYER */

audio.addEventListener('timeupdate', () => {

    const progress =
    document.getElementById('progressBar');

    progress.value =
    (audio.currentTime / audio.duration) * 100 || 0;

});

document.getElementById('progressBar')
.addEventListener('input', (e) => {

    audio.currentTime =
    (e.target.value / 100) * audio.duration;

});

document.getElementById('volumeControl')
.addEventListener('input', (e) => {

    audio.volume = e.target.value;

});

audio.addEventListener('pause',()=>{

    document.getElementById('mainPlayBtn')
    .innerHTML = '▶ PLAY';

    syncButtons();

});

audio.addEventListener('play',()=>{

    document.getElementById('mainPlayBtn')
    .innerHTML = '❚❚ PAUSE';

    syncButtons();

});

loadTracks();

</script>

</body>
</html>
