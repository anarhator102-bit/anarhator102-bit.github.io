<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>allowedcloud</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Space Grotesk',sans-serif;
    background:#050505;
    color:white;
    overflow:hidden;
}

.app{
    display:flex;
    height:100vh;
}

.sidebar{
    width:260px;
    background:#0d0d0d;
    border-right:1px solid rgba(255,255,255,0.06);
    padding:28px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:34px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:35px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav button{
    background:#151515;
    border:none;
    color:white;
    padding:15px;
    border-radius:16px;
    cursor:pointer;
    font-size:15px;
    transition:.25s;
}

.nav button:hover{
    background:white;
    color:black;
}

.upload-btn{
    margin-top:auto;
    background:white !important;
    color:black !important;
    font-weight:700;
}

.main{
    flex:1;
    overflow:auto;
    padding:35px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    width:320px;
    background:#111;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
    font-size:14px;
}

.profile{
    display:flex;
    align-items:center;
    gap:12px;
    background:#111;
    padding:12px 18px;
    border-radius:16px;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:white;
}

.hero{
    background:linear-gradient(145deg,#1b1b1b,#0d0d0d);
    border:1px solid rgba(255,255,255,0.06);
    padding:45px;
    border-radius:30px;
    margin-bottom:35px;
}

.hero h1{
    font-size:48px;
    margin-bottom:12px;
}

.hero p{
    opacity:.7;
    max-width:650px;
    line-height:1.6;
}

.section-title{
    margin-bottom:22px;
    font-size:24px;
}

.track-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
    padding-bottom:120px;
}

.card{
    background:#101010;
    border-radius:26px;
    padding:16px;
    border:1px solid rgba(255,255,255,0.05);
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px);
}

.cover{
    width:100%;
    height:210px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:16px;
}

.track-name{
    font-size:19px;
    font-weight:700;
    margin-bottom:5px;
}

.artist{
    opacity:.6;
    margin-bottom:18px;
}

.stats{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.stats-left{
    display:flex;
    gap:15px;
    font-size:14px;
    opacity:.8;
}

.play{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.player{
    position:fixed;
    bottom:0;
    left:260px;
    right:0;
    background:#0c0c0c;
    border-top:1px solid rgba(255,255,255,0.06);
    padding:16px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.player-track{
    display:flex;
    align-items:center;
    gap:14px;
}

.player-track img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:16px;
}

.controls{
    display:flex;
    align-items:center;
    gap:14px;
}

.controls button{
    border:none;
    background:white;
    color:black;
    padding:14px 18px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
}

.range{
    width:260px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal-content{
    width:420px;
    background:#0f0f0f;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:28px;
    padding:28px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content input{
    width:100%;
    margin-bottom:14px;
    background:#161616;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
}

.modal-content button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:16px;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.profile-page{
    display:none;
}

.profile-box{
    background:#101010;
    border-radius:30px;
    padding:40px;
}

.big-avatar{
    width:110px;
    height:110px;
    background:white;
    border-radius:50%;
    margin-bottom:20px;
}

.empty{
    opacity:.5;
    margin-top:12px;
}

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .player{
        left:0;
    }

    .search{
        width:180px;
    }

}
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@media (max-width: 768px){

    html,body{
        overflow-x:hidden !important;
        width:100% !important;
    }

    body{
        padding-bottom:190px !important;
    }

    .app{
        display:block !important;
    }

    .sidebar{
        position:fixed !important;
        bottom:0 !important;
        left:0 !important;
        right:0 !important;
        top:auto !important;
        width:100% !important;
        height:84px !important;
        z-index:99999 !important;
        padding:10px !important;
        border-top:1px solid rgba(255,255,255,.08) !important;
    }

    .logo{
        display:none !important;
    }

    .nav{
        display:flex !important;
        flex-direction:row !important;
        gap:10px !important;
        justify-content:space-between !important;
        align-items:center !important;
        width:100% !important;
    }

    .nav button{
        flex:1 !important;
        height:58px !important;
        border-radius:18px !important;
        font-size:12px !important;
    }

    .main{
        width:100% !important;
        padding:16px !important;
        padding-bottom:260px !important;
    }

    .header{
        flex-direction:column !important;
        gap:14px !important;
        align-items:stretch !important;
    }

    .search{
        width:100% !important;
        min-height:56px !important;
        border-radius:18px !important;
    }

    .profile{
        width:100% !important;
        justify-content:center !important;
    }

    .hero{
        padding:28px !important;
        border-radius:26px !important;
    }

    .hero h1{
        font-size:34px !important;
    }

    .track-grid{
        display:flex !important;
        flex-direction:column !important;
        gap:18px !important;
    }

    .card{
        width:100% !important;
        border-radius:24px !important;
    }

    .cover{
        width:100% !important;
        height:260px !important;
        object-fit:cover !important;
    }

    .player{
        left:0 !important;
        right:0 !important;
        bottom:84px !important;
        flex-direction:column !important;
        gap:16px !important;
        padding:18px !important;
        border-radius:26px 26px 0 0 !important;
    }

    .controls{
        flex-direction:column !important;
        width:100% !important;
        gap:14px !important;
    }

    .controls button,
    .range,
    .volume-box{
        width:100% !important;
    }

    .modal-content{
        width:94% !important;
        border-radius:28px !important;
    }

}
</style>

</head>

<body>

<div class="modal" id="uploadModal">
    <div class="modal-content">
        <h2>upload track</h2>

        <input type="text" id="trackTitle" placeholder="name track">

        <input type="text" id="trackArtist" placeholder="executor">

        <input type="file" id="trackCover" accept="image/*">

        <input type="file" id="trackAudio" accept="audio/*">

        <button onclick="uploadTrack()">upload track</button>
    </div>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">allo.wed cloud</div>

<div class="nav">
<button onclick="showHome()">main</button>
<button onclick="showProfile()">profile</button>
<button class="upload-btn" onclick="openUpload()">＋ upload a track</button>
</div>

</div>

<div class="main" id="homePage">

<div class="header">
<input class="search" id="searchInput" placeholder="track search..." onkeyup="searchTracks()">

<div class="profile" onclick="showProfile()" style="cursor:pointer;">
<div class="avatar"></div>
<div>@alex</div>
</div>
</div>

<div class="hero">
<h1>allo.wed cloud</h1>
<p>Upload your tracks, listen to music, collect likes and views from allo.wed cloud.</p>
</div>

<h2 class="section-title">all tracks</h2>

<div class="track-grid" id="trackGrid"></div>

</div>

<div class="main profile-page" id="profilePage">

<div class="profile-box">
<div class="big-avatar"></div>

<h1>@test</h1>

<p style="opacity:.6;margin-top:10px;">user's music profile</p>

<h2 style="margin-top:35px;">my tracks</h2>

<div id="myTracks" class="empty">
there are no uploaded tracks yet
</div>
</div>

</div>

</div>

<div class="player">

<div class="player-track">
<img id="playerCover" src="https://picsum.photos/100/100?grayscale">

<div>
<div id="playerTitle">there is no active track</div>
<div id="playerArtist" style="opacity:.6;font-size:14px;">—</div>
</div>
</div>

<div class="controls">
<button onclick="togglePlay()">Play / Pause</button>
<input type="range" class="range" id="progressBar" value="0">
</div>

</div>

<audio id="audio"></audio>

<script>

let tracks = [];
let currentTrack = null;

const audio = document.getElementById('audio');
const grid = document.getElementById('trackGrid');

function renderTracks(list = tracks){

    grid.innerHTML = '';

    if(list.length === 0){
        grid.innerHTML = '<div style="opacity:.5;">Треки пока не загружены</div>';
        return;
    }

    list.forEach(track => {

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <img class="cover" src="https://anarhator102-bit-github-io.onrender.com${track.cover}">
            <div class="track-name">${track.title}</div>
            <div class="artist">${track.artist}</div>

            <div class="stats">
                <div class="stats-left">
                    <span>▶ ${track.plays}</span>
                    <span onclick="likeTrack(${track.id})" style="cursor:pointer;">♥ ${track.likes}</span>
                </div>

                <button class="play" onclick="playTrack(${track.id})">▶</button>
            </div>
        `;

        grid.appendChild(card);
    });

    renderMyTracks();
}

function uploadTrack(){

    const title = document.getElementById('trackTitle').value;
    const artist = document.getElementById('trackArtist').value;

    const coverFile = document.getElementById('trackCover').files[0];
    const audioFile = document.getElementById('trackAudio').files[0];

    if(!title || !artist || !coverFile || !audioFile){
        alert('Заполни все поля');
        return;
    }

    const coverURL = URL.createObjectURL(coverFile);
    const audioURL = URL.createObjectURL(audioFile);

    const track = {
        id:Date.now(),
        title,
        artist,
        cover:coverURL,
        audio:audioURL,
        plays:0,
        likes:0
    };

    tracks.unshift(track);

    saveTracks();

    renderTracks();

    closeUpload();

    document.getElementById('trackTitle').value = '';
    document.getElementById('trackArtist').value = '';
    document.getElementById('trackCover').value = '';
    document.getElementById('trackAudio').value = '';
}

function playTrack(id){

    const track = tracks.find(t => t.id === id);

    if(!track) return;

    currentTrack = track;

    audio.src = 'https://anarhator102-bit-github-io.onrender.com' + track.audio;
    audio.play();

    track.plays++;

    saveTracks();

    renderTracks();

    document.getElementById('playerTitle').innerText = track.title;
    document.getElementById('playerArtist').innerText = track.artist;
    document.getElementById('playerCover').src = 'https://anarhator102-bit-github-io.onrender.com' + track.cover;
}

function togglePlay(){

    if(!audio.src) return;

    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

function likeTrack(id){

    const track = tracks.find(t => t.id === id);

    track.likes++;

    saveTracks();

    renderTracks();
}

function searchTracks(){

    const value = document.getElementById('searchInput').value.toLowerCase();

    const filtered = tracks.filter(track =>
        track.title.toLowerCase().includes(value) ||
        track.artist.toLowerCase().includes(value)
    );

    renderTracks(filtered);
}

function openUpload(){
    document.getElementById('uploadModal').style.display = 'flex';
}

function closeUpload(){
    document.getElementById('uploadModal').style.display = 'none';
}

window.onclick = function(e){
    if(e.target.id === 'uploadModal'){
        closeUpload();
    }
}

function showProfile(){
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('profilePage').style.display = 'block';
}

function showHome(){
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('profilePage').style.display = 'none';
}

function renderMyTracks(){

    const box = document.getElementById('myTracks');

    if(tracks.length === 0){
        box.innerHTML = 'Пока нет загруженных треков';
        return;
    }

    box.innerHTML = '';

    tracks.forEach(track => {

        const div = document.createElement('div');

        div.style.marginTop = '18px';
        div.style.padding = '16px';
        div.style.borderRadius = '18px';
        div.style.background = '#151515';

        div.innerHTML = `
            <strong>${track.title}</strong>
            <div style="opacity:.6;margin-top:6px;">${track.artist}</div>
            <div style="margin-top:10px;opacity:.7;">
                ▶ ${track.plays} &nbsp;&nbsp; ♥ ${track.likes}
            </div>
        `;

        box.appendChild(div);

    });

}

audio.addEventListener('timeupdate', () => {

    const progress = document.getElementById('progressBar');

    progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

document.getElementById('progressBar').addEventListener('input', (e) => {

    audio.currentTime = (e.target.value / 100) * audio.duration;
});

function saveTracks(){
    localStorage.setItem('tracks', JSON.stringify(tracks));
}

function loadTracks(){

    const saved = localStorage.getItem('tracks');

    if(saved){
        tracks = JSON.parse(saved);
    }

    renderTracks();
}

loadTracks();

</script>

</body>
</html>
