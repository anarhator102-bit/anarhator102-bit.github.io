<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>allowedcloud</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
}

body{
    font-family:'Space Grotesk',sans-serif;
    background:#050505;
    color:white;
    overflow:hidden;
    position:relative;
}

body::before{
    content:'';
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 70%);
    top:-200px;
    left:-200px;
    animation:floatBg 12s infinite alternate ease-in-out;
    filter:blur(40px);
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);
    bottom:-200px;
    right:-200px;
    animation:floatBg2 14s infinite alternate ease-in-out;
    filter:blur(50px);
    z-index:-1;
}

@keyframes floatBg{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(120px,80px) scale(1.2);
    }
}

@keyframes floatBg2{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(-100px,-70px) scale(1.15);
    }
}

.app{
    display:flex;
    height:100vh;
}

.sidebar{
    width:260px;
    background:#0d0d0d;
    border-right:1px solid rgba(255,255,255,0.06);
    padding:28px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:34px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:35px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav button{
    background:#151515;
    border:none;
    color:white;
    padding:15px;
    border-radius:16px;
    cursor:pointer;
    font-size:15px;
    transition:.25s;
    animation:fadeIn .5s ease;
}

.nav button:hover{
    background:white;
    color:black;
}

.upload-btn{
    margin-top:auto;
    background:white !important;
    color:black !important;
    font-weight:700;
}

.main{
    flex:1;
    overflow:auto;
    padding:35px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    width:320px;
    background:#111;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
    font-size:14px;
}

.profile{
    display:flex;
    align-items:center;
    gap:12px;
    background:#111;
    padding:12px 18px;
    border-radius:16px;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:white;
}

.hero{
    background:linear-gradient(145deg,#1b1b1b,#0d0d0d);
    border:1px solid rgba(255,255,255,0.06);
    padding:45px;
    border-radius:30px;
    margin-bottom:35px;
}

.hero h1{
    font-size:48px;
    margin-bottom:12px;
}

.hero p{
    opacity:.7;
    max-width:650px;
    line-height:1.6;
}

.section-title{
    margin-bottom:22px;
    font-size:24px;
}

.track-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
    padding-bottom:120px;
}

.card{
    background:#101010;
    border-radius:26px;
    padding:16px;
    border:1px solid rgba(255,255,255,0.05);
    transition:.25s;
    animation:fadeIn .5s ease;
}

.card:hover{
    transform:translateY(-6px);
}

.cover{
    width:100%;
    height:210px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:16px;
}

.track-name{
    font-size:19px;
    font-weight:700;
    margin-bottom:5px;
}

.artist{
    opacity:.6;
    margin-bottom:18px;
}

.stats{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.stats-left{
    display:flex;
    gap:15px;
    font-size:14px;
    opacity:.8;
}

.play{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.player{
    position:fixed;
    bottom:0;
    left:260px;
    right:0;
    background:#0c0c0c;
    border-top:1px solid rgba(255,255,255,0.06);
    padding:16px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.player-track{
    display:flex;
    align-items:center;
    gap:14px;
}

.player-track img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:16px;
}

.controls{
    display:flex;
    align-items:center;
    gap:14px;
}

.controls button{
    border:none;
    background:white;
    color:black;
    padding:14px 18px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
}

.range{
    width:260px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal-content{
    width:420px;
    background:#0f0f0f;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:28px;
    padding:28px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content input{
    width:100%;
    margin-bottom:14px;
    background:#161616;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
}

.modal-content button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:16px;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.profile-page{
    display:none;
}

.profile-box{
    background:#101010;
    border-radius:30px;
    padding:40px;
}

.big-avatar{
    width:110px;
    height:110px;
    background:white;
    border-radius:50%;
    margin-bottom:20px;
}

.empty{
    opacity:.5;
    margin-top:12px;
}


@media(max-width:768px){

    body{
        overflow:auto;
    }

    .app{
        flex-direction:column;
        height:auto;
        min-height:100vh;
    }

    .sidebar{
        width:100%;
        height:auto;
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.06);
        padding:18px;
        position:sticky;
        top:0;
        z-index:50;
        backdrop-filter:blur(20px);
    }

    .logo{
        font-size:26px;
        margin-bottom:18px;
    }

    .nav{
        flex-direction:row;
        overflow-x:auto;
        padding-bottom:4px;
    }

    .nav button{
        min-width:max-content;
        font-size:13px;
        padding:12px 16px;
    }

    .main{
        padding:18px;
        padding-bottom:160px;
    }

    .header{
        flex-direction:column;
        gap:14px;
        align-items:stretch;
    }

    .search{
        width:100%;
    }

    .profile{
        width:100%;
        justify-content:center;
    }

    .hero{
        padding:28px;
        border-radius:24px;
    }

    .hero h1{
        font-size:34px;
        line-height:1.1;
    }

    .hero p{
        font-size:14px;
    }

    .section-title{
        font-size:20px;
    }

    .track-grid{
        grid-template-columns:1fr;
        gap:18px;
        padding-bottom:220px;
    }

    .card{
        border-radius:22px;
    }

    .cover{
        height:240px;
    }

    .player{
        left:0;
        flex-direction:column;
        gap:16px;
        align-items:stretch;
        padding:18px;
    }

    .player-track{
        width:100%;
    }

    .controls{
        width:100%;
        flex-direction:column;
        align-items:stretch;
    }

    .controls button{
        width:100%;
    }

    .range{
        width:100%;
    }

    .volume-box{
        width:100%;
        justify-content:space-between;
    }

    .volume-range{
        flex:1;
    }

    .modal-content{
        width:92%;
        padding:22px;
        border-radius:24px;
    }

    .profile-box{
        padding:24px;
    }

    .big-avatar{
        width:90px;
        height:90px;
    }
}


@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(12px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.play{
    transition:.25s;
    box-shadow:0 0 25px rgba(255,255,255,0.18);
}

.play:hover{
    transform:scale(1.08) rotate(6deg);
}

.controls button{
    transition:.25s;
    position:relative;
    overflow:hidden;
}

.controls button:hover{
    transform:scale(1.06);
    box-shadow:0 0 30px rgba(255,255,255,.22);
}

.controls button::before{
    content:'';
    position:absolute;
    width:120%;
    height:120%;
    background:rgba(255,255,255,.15);
    left:-130%;
    top:0;
    transform:skewX(-25deg);
    transition:.5s;
}

.controls button:hover::before{
    left:130%;
}

.range{
    appearance:none;
    height:7px;
    border-radius:999px;
    background:linear-gradient(90deg,#ffffff,#888888);
    outline:none;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.range::-webkit-slider-thumb{
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#fff;
    box-shadow:-400px 0 0 400px white;
    transition:.2s;
}

.range::-webkit-slider-thumb:hover{
    transform:scale(1.2);
}

.volume-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:#141414;
    padding:10px 14px;
    border-radius:14px;
    animation:fadeIn .5s ease;
}

.volume-range{
    appearance:none;
    width:110px;
    height:6px;
    border-radius:999px;
    background:linear-gradient(90deg,#fff,#666);
    cursor:pointer;
}

.volume-range::-webkit-slider-thumb{
    appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:white;
    transition:.2s;
}

.volume-range::-webkit-slider-thumb:hover{
    transform:scale(1.15);
}

.card{
    backdrop-filter:blur(14px);
}

.cover{
    transition:.4s;
}

.card:hover .cover{
    transform:scale(1.03);
}

.logo{
    position:relative;
}

.logo::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-6px;
    width:70%;
    height:3px;
    border-radius:999px;
    background:white;
    animation:logoGlow 2.5s infinite alternate;
}

@keyframes logoGlow{
    from{
        opacity:.4;
        width:40%;
    }
    to{
        opacity:1;
        width:80%;
    }
}

.hero{
    overflow:hidden;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.06),transparent);
    animation:shine 6s infinite linear;
}

@keyframes shine{
    from{
        transform:translateX(-100%);
    }
    to{
        transform:translateX(100%);
    }
}

.profile,.search,.modal-content,input{
    transition:.25s;
}

.profile:hover,.search:focus,input:focus{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(255,255,255,.08);
}

</style>
</head>

<body>

<div class="modal" id="uploadModal">
    <div class="modal-content">
        <h2>upload track</h2>

        <input type="text" id="trackTitle" placeholder="name track">

        <input type="text" id="trackArtist" placeholder="executor">

        <input type="file" id="trackCover" accept="image/*">

        <input type="file" id="trackAudio" accept="audio/*">

        <button onclick="uploadTrack()">upload track</button>
    </div>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">allo.wed cloud</div>

<div class="nav">
<button onclick="showHome()">main</button>
<button onclick="showProfile()">profile</button>
<button class="upload-btn" onclick="openUpload()">＋ upload a track</button>
</div>

</div>

<div class="main" id="homePage">

<div class="header">
<input class="search" id="searchInput" placeholder="track search..." onkeyup="searchTracks()">

<div class="profile" onclick="showProfile()" style="cursor:pointer;">
<div class="avatar"></div>
<div>@alex</div>
</div>
</div>

<div class="hero">
<h1>allo.wed cloud</h1>
<p>Upload your tracks, listen to music, collect likes and views from allo.wed cloud.</p>
</div>

<h2 class="section-title">all tracks</h2>

<div class="track-grid" id="trackGrid"></div>

</div>

<div class="main profile-page" id="profilePage">

<div class="profile-box">
<div class="big-avatar"></div>

<h1>@test</h1>

<p style="opacity:.6;margin-top:10px;">user's music profile</p>

<h2 style="margin-top:35px;">my tracks</h2>

<div id="myTracks" class="empty">
there are no uploaded tracks yet
</div>
</div>

</div>

</div>

<div class="player">

<div class="player-track">
<img id="playerCover" src="https://picsum.photos/100/100?grayscale">

<div>
<div id="playerTitle">there is no active track</div>
<div id="playerArtist" style="opacity:.6;font-size:14px;">—</div>
</div>
</div>

<div class="controls">
<button id="mainPlayBtn" onclick="togglePlay()">▶ PLAY</button>

<input type="range" class="range" id="progressBar" value="0">

<div class="volume-box">
<span>🔊</span>
<input type="range" class="volume-range" id="volumeControl" min="0" max="1" step="0.01" value="1">
</div>

</div>

</div>

<audio id="audio"></audio>

<script>

let tracks = [];
let currentTrack = null;

const audio = document.getElementById('audio');
const grid = document.getElementById('trackGrid');

function renderTracks(list = tracks){

    grid.innerHTML = '';

    if(list.length === 0){
        grid.innerHTML = '<div style="opacity:.5;">Треки пока не загружены</div>';
        return;
    }

    list.forEach(track => {

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <img class="cover" src="${track.cover}">
            <div class="track-name">${track.title}</div>
            <div class="artist">${track.artist}</div>

            <div class="stats">
                <div class="stats-left">
                    <span>▶ ${track.plays}</span>
                    <span onclick="likeTrack(${track.id})" style="cursor:pointer;">♥ ${track.likes}</span>
                </div>

                <button class="play" onclick="playTrack(${track.id})">▶</button>
            </div>
        `;

        grid.appendChild(card);
    });

    renderMyTracks();
}

function uploadTrack(){

    const title = document.getElementById('trackTitle').value;
    const artist = document.getElementById('trackArtist').value;

    const coverFile = document.getElementById('trackCover').files[0];
    const audioFile = document.getElementById('trackAudio').files[0];

    if(!title || !artist || !coverFile || !audioFile){
        alert('Заполни все поля');
        return;
    }

    const coverURL = URL.createObjectURL(coverFile);
    const audioURL = URL.createObjectURL(audioFile);

    const track = {
        id:Date.now(),
        title,
        artist,
        cover:coverURL,
        audio:audioURL,
        plays:0,
        likes:0
    };

    tracks.unshift(track);

    saveTracks();

    renderTracks();

    closeUpload();

    document.getElementById('trackTitle').value = '';
    document.getElementById('trackArtist').value = '';
    document.getElementById('trackCover').value = '';
    document.getElementById('trackAudio').value = '';
}

function playTrack(id){

    const track = tracks.find(t => t.id === id);

    if(!track) return;

    currentTrack = track;

    audio.src = track.audio;
    audio.play();

    track.plays++;

    saveTracks();

    renderTracks();

    document.getElementById('playerTitle').innerText = track.title;
    document.getElementById('playerArtist').innerText = track.artist;
    document.getElementById('playerCover').src = track.cover;
}

function togglePlay(){

    if(!audio.src) return;

    const btn = document.getElementById('mainPlayBtn');

    if(audio.paused){
        audio.play();
        btn.innerHTML = '❚❚ PAUSE';
    }else{
        audio.pause();
        btn.innerHTML = '▶ PLAY';
    }
}

audio.addEventListener('play',()=>{
    document.getElementById('mainPlayBtn').innerHTML='❚❚ PAUSE';
});

audio.addEventListener('pause',()=>{
    document.getElementById('mainPlayBtn').innerHTML='▶ PLAY';
});

function likeTrack(id){

    const track = tracks.find(t => t.id === id);

    track.likes++;

    saveTracks();

    renderTracks();
}

function searchTracks(){

    const value = document.getElementById('searchInput').value.toLowerCase();

    const filtered = tracks.filter(track =>
        track.title.toLowerCase().includes(value) ||
        track.artist.toLowerCase().includes(value)
    );

    renderTracks(filtered);
}

function openUpload(){
    document.getElementById('uploadModal').style.display = 'flex';
}

function closeUpload(){
    document.getElementById('uploadModal').style.display = 'none';
}

window.onclick = function(e){
    if(e.target.id === 'uploadModal'){
        closeUpload();
    }
}

function showProfile(){
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('profilePage').style.display = 'block';
}

function showHome(){
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('profilePage').style.display = 'none';
}

function renderMyTracks(){

    const box = document.getElementById('myTracks');

    if(tracks.length === 0){
        box.innerHTML = 'Пока нет загруженных треков';
        return;
    }

    box.innerHTML = '';

    tracks.forEach(track => {

        const div = document.createElement('div');

        div.style.marginTop = '18px';
        div.style.padding = '16px';
        div.style.borderRadius = '18px';
        div.style.background = '#151515';

        div.innerHTML = `
            <strong>${track.title}</strong>
            <div style="opacity:.6;margin-top:6px;">${track.artist}</div>
            <div style="margin-top:10px;opacity:.7;">
                ▶ ${track.plays} &nbsp;&nbsp; ♥ ${track.likes}
            </div>
        `;

        box.appendChild(div);

    });

}

audio.addEventListener('timeupdate', () => {

    const progress = document.getElementById('progressBar');

    progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

document.getElementById('progressBar').addEventListener('input', (e) => {

    audio.currentTime = (e.target.value / 100) * audio.duration;
});

function saveTracks(){
    localStorage.setItem('tracks', JSON.stringify(tracks));
}

function loadTracks(){

    const saved = localStorage.getItem('tracks');

    if(saved){
        tracks = JSON.parse(saved);
    }

    renderTracks();
}

document.getElementById('volumeControl').addEventListener('input',(e)=>{
    audio.volume = e.target.value;
});

loadTracks();

</script>

</body>
</html>
